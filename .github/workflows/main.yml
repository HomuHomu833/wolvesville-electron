name: Build

on:
  push:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: 22

      - name: Setup Package
        run: npm install

      - name: Build Discord Addon
        run: npm run build-discord
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Package
        if: runner.os != 'macOS'
        run: npm run package

      - name: Build Package (macOS universal)
        if: runner.os == 'macOS'
        run: npx electron-forge package --arch universal

      - name: Apply Entitlements (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ldid
          bash ./scripts/mac-sign.sh out/Wolvesville-darwin-universal/Wolvesville.app entitlements.plist

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: Wolvesville-${{ matrix.os }}
          path: out/Wolvesville-*-*/*
