name: Build

on:
  push:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Discord Social SDK has libs for these — build the native addon.
          - os: ubuntu-latest
            discord: true
          - os: macos-26
            discord: true
          - os: macos-15-intel
            discord: true
          - os: windows-2022
            discord: true
          # No SDK libs for arm64 Windows/Linux — build without Discord.
          # index.js falls back to no-op Discord when the addon is absent.
          - os: ubuntu-24.04-arm
            discord: false
          - os: windows-11-arm
            discord: false
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: 22

      - name: Setup Package
        run: npm install

      - name: Build Discord Addon
        if: matrix.discord
        run: npm run build-discord
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Package
        run: npm run package

      - name: Apply Entitlements (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ldid
          bash ./scripts/mac-sign.sh out/Wolvesville-darwin-*/Wolvesville.app entitlements.plist

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: Wolvesville-${{ matrix.os }}
          path: out/Wolvesville-*-*/*
